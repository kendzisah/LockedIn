# XcodeGen project spec for the LockedIn Swift app.
#
# Generate the Xcode project with:
#   cd apps/ios-swift && xcodegen generate
#
# Install XcodeGen (one-time) with: `brew install xcodegen`.

name: LockedIn
options:
  bundleIdPrefix: com.flocktechnologies
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  defaultConfig: Debug
  xcodeVersion: "15.0"

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: NGFWFKBJU2
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ENABLE_HARDENED_RUNTIME: YES
    # Xcode 15+ defaults this to YES, which generates a fresh Info.plist from
    # INFOPLIST_KEY_* build settings and IGNORES any Info.plist file we point
    # `info.path` at. The DAM extension's `NSExtension` dictionary cannot be
    # expressed via INFOPLIST_KEY_* (it's a nested dict), so we force the
    # build to use our hand-written Info.plist files.
    GENERATE_INFOPLIST_FILE: NO
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
  AppsFlyerLib:
    url: https://github.com/AppsFlyerSDK/AppsFlyerFramework
    from: "6.14.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.58.0"
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.4.0"
  DesignKit:
    path: Packages/DesignKit

targets:
  LockedIn:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LockedIn
        excludes:
          - "**/*.md"
      - path: Shared
        excludes:
          - "**/*.md"
    resources:
      - path: LockedIn/Resources
        optional: true
      - path: LockedIn/Assets.xcassets
    # NOTE: NO `info:` block. XcodeGen overwrites the file when `info.path:`
    # is set without an `info.properties:` block. We point INFOPLIST_FILE at
    # the hand-managed file via build settings instead so XcodeGen never
    # touches it.
    entitlements:
      path: LockedIn/LockedIn.entitlements
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flocktechnologies.lockedin
        PRODUCT_NAME: LockedIn
        MARKETING_VERSION: "1.0.3"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_OBJC_BRIDGING_HEADER: LockedIn/LockedIn-Bridging-Header.h
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: LockedIn/Info.plist
        # Note: launch storyboard, status bar style, dark mode default, and
        # scene manifest are declared in LockedIn/Info.plist (file is the
        # source of truth because GENERATE_INFOPLIST_FILE = NO).
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
      - package: AppsFlyerLib
        product: AppsFlyerLib
      - package: PostHog
        product: PostHog
      - package: Lottie
        product: Lottie
      - package: DesignKit
        product: DesignKit
      - target: LockedInDeviceActivityMonitor
        embed: true
        codeSign: true
    scheme:
      testTargets: []
      gatherCoverageData: false

  LockedInDeviceActivityMonitor:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: DeviceActivityMonitorExtension
        excludes:
          - "**/*.md"
          - "Extension.entitlements"
      - path: Shared
        excludes:
          - "**/*.md"
    # NOTE: NO `info:` block — see same note on the main app target above.
    entitlements:
      path: DeviceActivityMonitorExtension/Extension.entitlements
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flocktechnologies.lockedin.DeviceActivityMonitor
        PRODUCT_NAME: LockedInDeviceActivityMonitor
        MARKETING_VERSION: "1.0.3"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: DeviceActivityMonitorExtension/Info.plist
        # Display name and NSExtension dict live in
        # DeviceActivityMonitorExtension/Info.plist. NSExtension is a nested
        # dictionary, so it cannot be expressed via INFOPLIST_KEY_* — the file
        # is the only path that works.
